

services:

  geocoding_service:
    build:
      context: .          # build from Dockerfile in the same folder
      dockerfile: Dockerfile
    container_name: geocoding_service
    environment:
      # --- Backend ---
      # Public Nominatim API (dev). For self-hosted swap to http://nominatim:8080
      - GEO_NOMINATIM_BASE_URL=https://nominatim.openstreetmap.org

      # Nominatim usage policy requires identifying your app via email.
      # Change this to your real email address.
      - GEO_CONTACT_EMAIL=your@email.com

      # --- Location bias (Magdeburg) ---
      - GEO_BIAS_LAT=52.1205
      - GEO_BIAS_LON=11.6276

      # --- Cache ---
      - GEO_CACHE_MAXSIZE=2000
      - GEO_CACHE_TTL_SECONDS=3600   # cache results for 1 hour

      # --- CORS ---
      # Restrict this to your dashboard origin in production, e.g.:
      # - GEO_CORS_ORIGINS=["http://localhost:3000","https://yourdashboard.com"]
      - GEO_CORS_ORIGINS=["*"]

    ports:
      - "8001:8001"    # geocoding service available at http://localhost:8001

    networks:
      - simple_engine_net

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # =============================================================================
  # SELF-HOSTED NOMINATIM (PRODUCTION — uncomment when ready)
  # =============================================================================
  # Steps to enable:
  #   1. Download your OSM extract:
  #      wget -O data/sachsen-anhalt.osm.pbf \
  #        https://download.geofabrik.de/europe/germany/sachsen-anhalt-latest.osm.pbf
  #   2. Uncomment the nominatim block below
  #   3. Change GEO_NOMINATIM_BASE_URL above to http://nominatim:8080
  #   4. Run: docker compose -f docker-compose.geocoding.yml up -d --build
  #      (first run takes ~10-20 min to import the .pbf)
  #
  # nominatim:
  #   image: mediagis/nominatim:4.4
  #   container_name: nominatim
  #   volumes:
  #     - nominatim_data:/var/lib/postgresql/14/main
  #     - ./data/sachsen-anhalt.osm.pbf:/nominatim/data.osm.pbf:ro
  #   environment:
  #     - PBF_PATH=/nominatim/data.osm.pbf
  #     - REPLICATION_URL=https://download.geofabrik.de/europe/germany/sachsen-anhalt-updates/
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - simple_engine_net
  #   restart: unless-stopped
  #   shm_size: 1gb

networks:
  simple_engine_net:
    driver: bridge
    # If you already have a Docker network for Simple Engine, replace the above with:
    # simple_engine_net:
    #   external: true

# volumes:
#   nominatim_data:    # uncomment when self-hosted nominatim is enabled